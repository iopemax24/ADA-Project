<!DOCTYPE html>
<html>
<head>
    <title>Route Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Route Planner</h2>

<div class="controls">
    <button onclick="loadDemo()">Load Demo</button>

    <div class="section">
        <input id="from" placeholder="From">
        <input id="to" placeholder="To">
        <input id="weight" type="number" placeholder="Distance">
        <button onclick="addEdge()">Add</button>
    </div>

    <div class="section">
        <input id="start" placeholder="Start">
        <input id="end" placeholder="End">
        <button onclick="runDijkstra()">Dijkstra</button>
        <button onclick="runAstar()">A*</button>
    </div>
</div>

<div class="canvas-box">
    <canvas id="canvas" width="720" height="420"></canvas>
</div>

<p id="output"></p>

<script src="script.js"></script>
</body>
</html>
